<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: #aaa;
      font-size: 13px;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #eee;
      border-radius: 12px;
      font-size: 15px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #667eea; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .btn-secondary { background: #f5f5f5; color: #555; }

    .error { color: #e24b4a; font-size: 13px; margin-top: 4px; }

    #app { display: none; }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .btn-logout {
      background: #f5f5f5;
      border: none;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input { margin: 0; }

    .btn-add {
      padding: 12px 18px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
      white-space: nowrap;
    }

    ul { list-style: none; }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      background: #f9f9f9;
      transition: background 0.2s;
    }

    li:hover { background: #f0f0f0; }

    li span {
      cursor: pointer;
      font-size: 15px;
      color: #333;
    }

    li span.done {
      text-decoration: line-through;
      color: #bbb;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #ddd;
      font-size: 20px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .btn-delete:hover { color: #e24b4a; }

    .empty {
      text-align: center;
      color: #ccc;
      font-size: 14px;
      padding: 30px 0;
    }
  </style>
</head>
<body>
  <div class="card">

    <div id="auth">
      <h1>Bienvenido</h1>
      <p class="subtitle">Inicia sesión para ver tus tareas</p>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Contraseña">
      <button class="btn btn-primary" onclick="login()">Iniciar sesión</button>
      <button class="btn btn-secondary" onclick="registro()">Crear cuenta</button>
      <p class="error" id="error"></p>
    </div>

    <div id="app">
      <div class="top">
        <h1>Mis tareas</h1>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
      </div>
      <div class="input-row">
        <input type="text" id="input-tarea" placeholder="Agregar tarea...">
        <button class="btn-add" onclick="crearTarea()">+</button>
      </div>
      <ul id="lista-tareas"></ul>
    </div>

  </div>

  <script>
    const API = "https://web-production-28362.up.railway.app";

    function getToken() {
      return localStorage.getItem("token");
    }

    function cerrarSesion() {
      localStorage.removeItem("token");
      document.getElementById("auth").style.display = "block";
      document.getElementById("app").style.display = "none";
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem("token", data.token);
        mostrarApp();
      } else {
        document.getElementById("error").textContent = data.error;
      }
    }

    async function registro() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const res = await fetch(`${API}/registro`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.mensaje) {
        alert("Cuenta creada, ahora inicia sesión");
      } else {
        document.getElementById("error").textContent = data.error;
      }
    }

    function mostrarApp() {
      document.getElementById("auth").style.display = "none";
      document.getElementById("app").style.display = "block";
      cargarTareas();
    }

    async function cargarTareas() {
      const res = await fetch(`${API}/tareas`, {
        headers: { "Authorization": `Bearer ${getToken()}` }
      });
      const tareas = await res.json();
      const lista = document.getElementById("lista-tareas");
      lista.innerHTML = "";
      if (tareas.length === 0) {
        lista.innerHTML = '<p class="empty">No tienes tareas aún</p>';
        return;
      }
      tareas.forEach((t) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <span class="${t.completada ? 'done' : ''}" onclick="completarTarea(${t.id})">${t.titulo}</span>
          <button class="btn-delete" onclick="eliminarTarea(${t.id})">×</button>
        `;
        lista.appendChild(li);
      });
    }

    async function crearTarea() {
      const input = document.getElementById("input-tarea");
      const titulo = input.value.trim();
      if (!titulo) return;
      await fetch(`${API}/tareas`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${getToken()}`
        },
        body: JSON.stringify({ titulo, completada: false })
      });
      input.value = "";
      cargarTareas();
    }

    async function eliminarTarea(id) {
      await fetch(`${API}/tareas/${id}`, {
        method: "DELETE",
        headers: { "Authorization": `Bearer ${getToken()}` }
      });
      cargarTareas();
    }

    async function completarTarea(id) {
      await fetch(`${API}/tareas/${id}`, {
        method: "PUT",
        headers: { "Authorization": `Bearer ${getToken()}` }
      });
      cargarTareas();
    }

    if (getToken()) {
      mostrarApp();
    }
  </script>
</body>
</html>
