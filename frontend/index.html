<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do App</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 20px;
    }
    input {
      width: 70%;
      padding: 8px;
      font-size: 16px;
    }
    button {
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
    }
    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }
    li {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
    }
    #auth { margin-bottom: 20px; }
    #app { display: none; }
  </style>
</head>
<body>

  <div id="auth">
    <h1>Iniciar sesión</h1>
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>
    <button onclick="login()">Entrar</button>
    <button onclick="registro()">Registrarse</button>
    <p id="error" style="color:red"></p>
  </div>

  <div id="app">
    <h1>Mis tareas</h1>
    <button onclick="cerrarSesion()">Cerrar sesión</button><br><br>
    <input type="text" id="input-tarea" placeholder="Nueva tarea...">
    <button onclick="crearTarea()">Agregar</button>
    <ul id="lista-tareas"></ul>
  </div>

  <script>
    const API = "https://web-production-28362.up.railway.app";

    function getToken() {
      return localStorage.getItem("token");
    }

    function cerrarSesion() {
      localStorage.removeItem("token");
      document.getElementById("auth").style.display = "block";
      document.getElementById("app").style.display = "none";
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem("token", data.token);
        mostrarApp();
      } else {
        document.getElementById("error").textContent = data.error;
      }
    }

    async function registro() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const res = await fetch(`${API}/registro`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.mensaje) {
        alert("Cuenta creada, ahora inicia sesión");
      } else {
        document.getElementById("error").textContent = data.error;
      }
    }

    function mostrarApp() {
      document.getElementById("auth").style.display = "none";
      document.getElementById("app").style.display = "block";
      cargarTareas();
    }

    async function cargarTareas() {
      const res = await fetch(`${API}/tareas`, {
        headers: { "Authorization": `Bearer ${getToken()}` }
      });
      const tareas = await res.json();
      const lista = document.getElementById("lista-tareas");
      lista.innerHTML = "";
      tareas.forEach((t) => {
        const li = document.createElement("li");
        li.style.textDecoration = t.completada ? "line-through" : "none";
        li.style.color = t.completada ? "#aaa" : "inherit";
        li.innerHTML = `
          <span onclick="completarTarea(${t.id})" style="cursor:pointer">${t.titulo}</span>
          <button onclick="eliminarTarea(${t.id})">Eliminar</button>
        `;
        lista.appendChild(li);
      });
    }

    async function crearTarea() {
      const input = document.getElementById("input-tarea");
      const titulo = input.value.trim();
      if (!titulo) return;
      await fetch(`${API}/tareas`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${getToken()}`
        },
        body: JSON.stringify({ titulo, completada: false })
      });
      input.value = "";
      cargarTareas();
    }

    async function eliminarTarea(id) {
      await fetch(`${API}/tareas/${id}`, {
        method: "DELETE",
        headers: { "Authorization": `Bearer ${getToken()}` }
      });
      cargarTareas();
    }

    async function completarTarea(id) {
      await fetch(`${API}/tareas/${id}`, {
        method: "PUT",
        headers: { "Authorization": `Bearer ${getToken()}` }
      });
      cargarTareas();
    }

    if (getToken()) {
      mostrarApp();
    }
  </script>
</body>
</html>
